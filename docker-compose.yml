services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ragkit-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ragkit-postgres
    environment:
      POSTGRES_USER: ragkit
      POSTGRES_PASSWORD: ragkit
      POSTGRES_DB: ragkit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:
